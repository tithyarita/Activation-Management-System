<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Leaflet CSS/JS for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
      #ba-reminder-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.45);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s;
      }
      #ba-reminder-modal .ba-reminder-content {
        background: #fff;
        padding: 32px 28px 24px 28px;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        max-width: 340px;
        width: 90vw;
        text-align: center;
        position: relative;
        animation: baPopIn 0.25s cubic-bezier(.4,1.4,.6,1) 1;
      }
      #ba-reminder-message {
        font-size: 1.15rem;
        color: #222;
        margin-bottom: 18px;
      }
      #ba-reminder-actions button {
        margin: 0 6px;
        min-width: 110px;
        font-size: 1rem;
        padding: 8px 0;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
        transition: background 0.18s;
      }
      #ba-reminder-actions button.btn-green {
        background: #22c55e;
      }
      #ba-reminder-actions button.btn-blue {
        background: #2563eb;
      }
      #ba-reminder-actions button:hover {
        filter: brightness(0.93);
      }
      @keyframes baPopIn {
        0% { transform: scale(0.85); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>
  <meta charset="UTF-8">
  <title>BA Dashboard</title>
  <link rel="stylesheet" href="ba-clockin.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: #f6f8fa;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 36px auto 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 32px 28px 32px 28px;
    }
    .header {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .ba-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #fafbfc;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }
    .ba-table th, .ba-table td {
      padding: 10px 8px;
      text-align: left;
    }
    .ba-table th {
      background: #f1f5f9;
      font-weight: 600;
      color: #222;
      border-bottom: 1px solid #e5e7eb;
    }
    .ba-table tr:nth-child(even) {
      background: #f8fafc;
    }
    .ba-table tr:hover {
      background: #e8f0fe;
    }
    .ba-select {
      width: 100%;
      max-width: 400px;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      margin-bottom: 12px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      outline: none;
      transition: border 0.2s;
    }
    .ba-select:focus {
      border: 1.5px solid #2563eb;
    }
    .ba-clockin-btn {
      font-size: 1.1rem;
      padding: 12px 0;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(37,99,235,0.07);
      margin-top: 8px;
    }
    .photo-box {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .photo-box canvas {
      width: 100%;
      max-width: 340px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .button-group {
      margin-top: 18px;
    }
    @media (max-width: 600px) {
      .container {
        padding: 12px 2vw 18px 2vw;
      }
      .header {
        font-size: 1.05rem;
      }
      .ba-table th, .ba-table td {
        padding: 7px 4px;
      }
      .ba-select {
        font-size: 0.97rem;
      }
    }
  </style>
  <!-- Load Firebase and your firebase.js module -->
  <script type="module" src="../js/firebase.js"></script>

<body>

<!-- Custom Popup Modal removed -->
<div class="container">

  <div class="header" style="background-color: var(--header-bg);">
    <div>BA Dashboard</div>
    <div>Welcome, BA</div>
  </div>

  <!-- Permission popups removed: zone-warning and location-modal -->

  <!-- Permission popups removed: zone-map, permission-camera, permission-confirm -->
  <div id="ba-schedule-box" style="margin-bottom:24px">
    <h3>My Schedule</h3>
    <label for="campaignSelect" style="font-weight:600;display:block;margin-bottom:6px;">Select Campaign:</label>
    <select id="campaignSelect" class="ba-select"></select>
    <table id="ba-schedule-table" class="ba-table">
      <thead>
        <tr><th>Campaign</th><th>Start</th><th>End</th><th>Location</th></tr>
      </thead>
      <tbody id="ba-schedule-body"><tr><td colspan="4">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="button-group">
    <!-- Camera Modal (hidden by default) -->
    <div id="camera-modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.55);z-index:3000;align-items:center;justify-content:center;">
      <div id="camera-modal-content" style="background:#fff;padding:24px 18px 18px 18px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);max-width:350px;width:92vw;text-align:center;position:relative;">
        <button id="close-camera-modal" style="position:absolute;top:8px;right:12px;font-size:1.3rem;background:none;border:none;cursor:pointer;">&times;</button>
        <div id="camera-modal-body"></div>
      </div>
    </div>
    <!-- Out of Zone Modal -->
    <div id="outOfZoneModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.10);z-index:4000;align-items:center;justify-content:center;">
      <div id="outOfZoneModalCard" style="background:#fff;padding:32px 28px 24px 28px;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.13);max-width:370px;width:92vw;text-align:center;position:relative;">
        <div style="font-size:3.2rem;margin-bottom:10px;line-height:1;">
          <img src="https://cdn-icons-png.flaticon.com/512/595/595067.png" alt="Warning" style="width:54px;height:54px;filter:drop-shadow(0 2px 8px #f43f5e33);">
        </div>
        <h2 style="margin:0 0 10px 0;color:#1a2233;font-size:1.32rem;font-weight:700;letter-spacing:-0.5px;">Cannot Clock In</h2>
        <div id="outOfZoneMsg" style="margin-bottom:10px;color:#444;font-size:1.08rem;">You are outside the allowed area.</div>
        <div style="margin-bottom:12px;font-size:1.07rem;">
          <b style="color:#222">Allowed radius:</b> <span id="allowedRadius" style="color:#2563eb;font-weight:600">100</span> meters<br>
          <b style="color:#222">Your distance:</b> <span id="yourDistance" style="color:#2563eb;font-weight:600;background:#f1f5f9;padding:2px 8px;border-radius:6px;">?</span> meters
        </div>
        <div id="outOfZoneMap" style="width:100%;height:200px;max-width:320px;margin:0 auto 18px auto;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px #0001;"></div>
        <button id="signOutBtn" class="btn" style="width:100%;margin-top:8px;background:#222;color:#fff;font-weight:600;font-size:1.08rem;padding:10px 0;border-radius:8px;">Sign Out</button>
      </div>
    </div>
  <script type="module">
    import { loadBASchedule } from '../js/ba-schedule.js';
    function getCurrentUser() {
      try { return JSON.parse(sessionStorage.getItem('user')); } catch (e) { return null; }
    }
    // Show camera/photo UI for clock-in
    window.showCameraBox = function() {
      document.querySelector('.photo-box').scrollIntoView({behavior:'smooth'});
      // Optionally, you can add logic to show/hide camera/photo UI here
    }

    async function renderSchedule() {
      // Hide/clear camera/photo UI on page load
      const photoBox = document.querySelector('.photo-box');
      if (photoBox) photoBox.innerHTML = '';
      const user = getCurrentUser();
      if (!user || !user.id) return;
      const campaigns = await loadBASchedule(user.id);
      const body = document.getElementById('ba-schedule-body');
      const select = document.getElementById('campaignSelect');
      if (!body || !select) return;
      if (campaigns.length === 0) {
        body.innerHTML = '<tr><td colspan="4">No assigned campaigns.</td></tr>';
        select.innerHTML = '<option value="">No campaigns</option>';
        select.disabled = true;
        return;
      }
      // For each campaign, check clock-in/out status
      const mod = await import('../js/firebase.js');
      const { db, collection, query, where, getDocs } = mod;
      const today = new Date().toISOString().slice(0,10);
      // Get all ba_clockins for this user
      const allClockinsSnap = await getDocs(query(collection(db, 'ba_clockins'), where('baId', '==', user.id)));
      const campaignStatus = {};
      allClockinsSnap.forEach(doc => {
        const d = doc.data();
        if (!campaignStatus[d.campaignId]) campaignStatus[d.campaignId] = { clockin: false, clockout: false };
        if (d.type === 'clockin') campaignStatus[d.campaignId].clockin = true;
        if (d.type === 'clockout') campaignStatus[d.campaignId].clockout = true;
      });
      body.innerHTML = campaigns.map(c => {
        const start = c.start_date ? new Date(c.start_date).toLocaleDateString() : '';
        const end = c.end_date ? new Date(c.end_date).toLocaleDateString() : '';
        const loc = c.location || '';
        const startRaw = c.start_date ? new Date(c.start_date).toISOString().slice(0,10) : '';
        const endRaw = c.end_date ? new Date(c.end_date).toISOString().slice(0,10) : '';
        const available = (today >= startRaw && today <= endRaw);
        const status = campaignStatus[c.id] || { clockin: false, clockout: false };
        let action = '';
        if (!status.clockin && available) {
          action = `<button class="btn btn-green ba-clockin-btn" style="padding:6px 18px;font-size:0.98rem" onclick="window.selectCampaignAndShowCamera('${c.id}','${c.name||''}','${c.start_date||''}','${c.end_date||''}','${c.locationCoords?.lat||''}','${c.locationCoords?.lng||''}','${c.location||''}')">Clock In</button>`;
        } else if (status.clockin && !status.clockout) {
          action = `<button class="btn btn-red ba-clockin-btn" style="padding:6px 18px;font-size:0.98rem" onclick="window.clockOutCampaign('${c.id}','${c.name||''}')">Clock Out</button>`;
        } else if (status.clockin && status.clockout) {
          action = `<span style="color:#22c55e;font-size:0.97rem">Completed</span>`;
        } else {
          action = `<span style="color:#888;font-size:0.97rem">Not available for clock-in today</span>`;
        }
        return `<tr><td>${c.name || ''}</td><td>${start}</td><td>${end}</td><td>${loc}<br>${action}</td></tr>`;
      }).join('');
      // Populate campaign select
      select.innerHTML = '<option value="">-- Select Campaign --</option>' + campaigns.map(c => {
        return `<option value="${c.id}" data-name="${c.name || ''}" data-start="${c.start_date || ''}" data-end="${c.end_date || ''}" data-lat="${c.locationCoords?.lat || ''}" data-lng="${c.locationCoords?.lng || ''}" data-location="${c.location || ''}">${c.name || ''} (${c.start_date ? new Date(c.start_date).toLocaleDateString() : ''} - ${c.end_date ? new Date(c.end_date).toLocaleDateString() : ''})</option>`;
      }).join('');
      select.disabled = false;
      // Hide campaign select since clock-in is now per-campaign
      select.style.display = 'none';
    }
    renderSchedule();

    // Clock out logic
    window.clockOutCampaign = async function(campaignId, campaignName) {
      const user = getCurrentUser();
      if (!user || !campaignId) return;
      if (!confirm(`Clock out of campaign: ${campaignName}?`)) return;
      const mod = await import('../js/firebase.js');
      const { db, collection, addDoc } = mod;
      // Save clockout record
      await addDoc(collection(db, 'ba_clockins'), {
        baId: user.id,
        baName: user.name,
        campaignId,
        campaignName,
        timestamp: Date.now(),
        type: 'clockout',
        clock_out_time: new Date().toISOString(),
      });
      alert('Clock-out successful!');
      window.location.reload();
    }
      // Helper for clock-in button under each campaign
      window.selectCampaignAndShowCamera = async function(id, name, start, end, lat, lng, location) {
        // Hide camera/photo UI until location is verified
        const cameraModal = document.getElementById('camera-modal');
        const cameraModalBody = document.getElementById('camera-modal-body');
        if (cameraModal) cameraModal.style.display = 'none';
        if (cameraModalBody) cameraModalBody.innerHTML = '';
        sessionStorage.setItem('currentCampaignId', id);
        sessionStorage.setItem('currentCampaignName', name);
        sessionStorage.setItem('currentCampaignStart', start);
        sessionStorage.setItem('currentCampaignEnd', end);
        sessionStorage.setItem('currentCampaignLat', lat);
        sessionStorage.setItem('currentCampaignLng', lng);
        sessionStorage.setItem('currentCampaignLocation', location);
        // Step 1: Location Verification
        let userLat = null, userLng = null;
        const geoOk = await new Promise((resolve) => {
          if (!navigator.geolocation) {
            alert('Geolocation not supported.');
            resolve(false);
            return;
          }
          navigator.geolocation.getCurrentPosition(function(pos) {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            // Geofence check (100m)
            function getDistance(lat1, lon1, lat2, lon2) {
              function toRad(x) { return x * Math.PI / 180; }
              const R = 6371000;
              const dLat = toRad(lat2 - lat1);
              const dLon = toRad(lon2 - lon1);
              const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) * Math.sin(dLon/2);
              const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
              return R * c;
            }
            let dist = Infinity;
            if (!isNaN(lat) && !isNaN(lng)) {
              dist = getDistance(userLat, userLng, parseFloat(lat), parseFloat(lng));
            }
            if (dist <= 100) {
              resolve(true);
            } else {
              showOutOfZoneModal(userLat, userLng, parseFloat(lat), parseFloat(lng), dist);
              resolve(false);
            }
                // Out of Zone Modal logic
                function showOutOfZoneModal(userLat, userLng, allowedLat, allowedLng, distance) {
                  const modal = document.getElementById('outOfZoneModal');
                  const msg = document.getElementById('outOfZoneMsg');
                  const allowedRadius = document.getElementById('allowedRadius');
                  const yourDistance = document.getElementById('yourDistance');
                  if (modal) modal.style.display = 'flex';
                  if (msg) msg.innerHTML = `You are outside the allowed area (<b>${Math.round(distance)}</b> meters away)`;
                  if (allowedRadius) allowedRadius.textContent = '100';
                  if (yourDistance) yourDistance.textContent = Math.round(distance);
                  // Show map after modal is visible
                  setTimeout(() => {
                    if (window.L) {
                      const mapDiv = document.getElementById('outOfZoneMap');
                      if (mapDiv) {
                        mapDiv.innerHTML = '';
                        const map = L.map(mapDiv).setView([allowedLat, allowedLng], 16);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                          attribution: '© OpenStreetMap contributors'
                        }).addTo(map);
                        // Allowed radius circle
                        L.circle([allowedLat, allowedLng], {radius: 100, color: '#2563eb', fillColor: '#2563eb22', fillOpacity: 0.2, weight: 2, dashArray: '4 4'}).addTo(map);
                        // Allowed location marker (red)
                        L.marker([allowedLat, allowedLng], {icon: L.icon({iconUrl: 'https://cdn-icons-png.flaticon.com/512/484/484167.png', iconSize: [32, 32], iconAnchor: [16, 32]})}).addTo(map);
                        // User location marker (blue)
                        L.marker([userLat, userLng], {icon: L.icon({iconUrl: 'https://cdn-icons-png.flaticon.com/512/64/64113.png', iconSize: [32, 32], iconAnchor: [16, 32]})}).addTo(map);
                        setTimeout(()=>{ map.invalidateSize(); }, 350);
                      }
                    }
                  }, 200);
                  // Sign Out button
                  const signOutBtn = document.getElementById('signOutBtn');
                  if (signOutBtn) signOutBtn.onclick = function() {
                    window.location.replace('../html/admin/login.html');
                  };
                }
          }, function() {
            alert('Could not get location.');
            resolve(false);
          }, { enableHighAccuracy: true, timeout: 5000 });
        });
        if (!geoOk) return;
        // Step 2: Show camera and take photo
        await window.showCameraAndSaveClockIn(userLat, userLng, id, name, start, end, lat, lng, location);
      }

      window.showCameraAndSaveClockIn = async function(userLat, userLng, campaignId, campaignName, start, end, campaignLat, campaignLng, campaignLocation) {
        // Show camera UI in modal after location is verified
        const cameraModal = document.getElementById('camera-modal');
        const cameraModalBody = document.getElementById('camera-modal-body');
        if (cameraModal && cameraModalBody) {
          cameraModalBody.innerHTML = `<video id="webcam" autoplay playsinline width="100%" style="max-width:320px;border-radius:10px;"></video><br><button class="btn btn-blue" id="takePhotoBtn">📷 Take Photo</button><img id="photo-preview" style="display:none;max-width:320px;border-radius:10px;margin-top:12px;"/><button id="confirmBtn" class="btn btn-green" style="display:none;margin-top:10px;">Confirm & Clock In</button>`;
          cameraModal.style.display = 'flex';
        }
        // Start camera
        const video = document.getElementById('webcam');
        let stream = null;
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
        }
        let photoData = null;
        document.getElementById('takePhotoBtn').onclick = function() {
          const canvas = document.createElement('canvas');
          canvas.width = 320;
          canvas.height = 240;
          canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
          photoData = canvas.toDataURL('image/jpeg', 0.7);
          document.getElementById('photo-preview').src = photoData;
          document.getElementById('photo-preview').style.display = '';
          document.getElementById('confirmBtn').style.display = '';
          video.style.display = 'none';
          if (stream) stream.getTracks().forEach(t => t.stop());
        };
        document.getElementById('confirmBtn').onclick = async function() {
          // Save to Firestore with base64 photo
          const user = getCurrentUser();
          const mod = await import('../js/firebase.js');
          const { db, collection, addDoc } = mod;
          await addDoc(collection(db, 'ba_clockins'), {
            baId: user.id,
            baName: user.name,
            campaignId,
            campaignName,
            photoBase64: photoData,
            timestamp: Date.now(),
            type: 'clockin',
            clock_in_time: new Date().toISOString(),
            lat: userLat,
            lng: userLng,
            campaignLat,
            campaignLng,
            campaignLocation
          });
          alert('Clock-in successful!');
          // Hide camera modal after successful clock-in
          if (cameraModal) cameraModal.style.display = 'none';
          if (cameraModalBody) cameraModalBody.innerHTML = '';
          window.location.reload();
        };
        // Close modal handler
        document.getElementById('close-camera-modal').onclick = function() {
          if (cameraModal) cameraModal.style.display = 'none';
          if (cameraModalBody) cameraModalBody.innerHTML = '';
          if (stream) stream.getTracks().forEach(t => t.stop());
        };
      }
  </script>

  </script>

<script>
// --- AUTH GUARD & CAMPAIGN ASSIGNMENT FETCH ---
async function ensureBAAuthAndCampaign() {
    // After campaign info is set, check BA clock-in/out status for this campaign
    let campaignId = sessionStorage.getItem('currentCampaignId') || '';
    let assignmentDateOK = false;
    let todayStr = new Date().toISOString().slice(0, 10);
    // If assignment has a date, check it
    if (sessionStorage.getItem('currentAssignmentDate')) {
      assignmentDateOK = sessionStorage.getItem('currentAssignmentDate') === todayStr;
    } else {
      // fallback: allow if no date in assignment
      assignmentDateOK = true;
    }
    if (campaignId && assignmentDateOK) {
      let db = window.db, collection = window.collection, query = window.query, where = window.where, getDocs = window.getDocs;
      if (!db || !collection || !query || !where || !getDocs) {
        const mod = await import('../js/firebase.js');
        db = mod.db; collection = mod.collection; query = mod.query; where = mod.where; getDocs = mod.getDocs;
      }
      const q = query(collection(db, 'ba_clockins'), where('baId', '==', user.id), where('campaignId', '==', campaignId));
      const snap = await getDocs(q);
      let hasClockIn = false, hasClockOut = false;
      snap.forEach(doc => {
        const d = doc.data();
        if (d.type === 'clockin') hasClockIn = true;
        if (d.type === 'clockout') hasClockOut = true;
      });
      const container = document.querySelector('.container');
      const showReminderModal = (msg, actionsHtml = '', onClose = null) => {
        const modal = document.getElementById('ba-reminder-modal');
        const msgDiv = document.getElementById('ba-reminder-message');
        const actionsDiv = document.getElementById('ba-reminder-actions');
        msgDiv.innerHTML = msg;
        actionsDiv.innerHTML = actionsHtml;
        modal.style.display = 'flex';
        // Remove previous listeners
        actionsDiv.onclick = null;
        if (onClose) {
          modal.dataset.onClose = '1';
          modal.onclick = (e) => {
            if (e.target === modal) { modal.style.display = 'none'; onClose(); }
          };
        } else {
          modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
        }
      };
      if (hasClockIn && hasClockOut) {
        if (container) container.style.display = 'none';
        setTimeout(() => {
          showReminderModal('You have already completed this campaign.<br>No further action is needed.', '<button class="btn btn-blue" onclick="document.getElementById(\'ba-reminder-modal\').style.display=\'none\'">OK</button>');
        }, 300);
      } else if (hasClockIn && !hasClockOut) {
        if (container) container.style.display = 'none';
        setTimeout(() => {
          showReminderModal('You have already clocked in for this campaign.<br>Please clock out to complete.',
            '<button class="btn btn-green" id="ba-reminder-clockout-btn">Proceed to Clock Out</button>',
            null);
          setTimeout(() => {
            const btn = document.getElementById('ba-reminder-clockout-btn');
            if (btn) btn.onclick = () => {
              document.getElementById('ba-reminder-modal').style.display = 'none';
              showPage('permission-camera');
            };
          }, 50);
        }, 300);
      } else {
        // Always show a default popup if nothing else is triggered
        if (container) container.style.display = 'none';
        setTimeout(() => {
          showReminderModal(
            'No campaign action required or no assignment found for today.',
            '<button class="btn btn-blue" id="ba-reminder-ok-btn">OK</button>'
          );
          setTimeout(() => {
            const okBtn = document.getElementById('ba-reminder-ok-btn');

              document.getElementById('ba-reminder-modal').style.display = 'none';
              window.location.replace('../html/admin/login.html');
            };
          }, 50);
        }, 300);
      }
      // If not clocked in, do nothing (proceed as normal)
    } else if (!assignmentDateOK) {
      alert('Your campaign assignment is not for today.');
      window.location.replace('../html/admin/login.html');
      return;
    }
  let user = null;
  try { user = JSON.parse(sessionStorage.getItem('user')); } catch (e) {}
  if (!user || (user.role !== 'staff' && user.role !== 'ba' && user.role !== 'brand_ambassador')) {
    sessionStorage.clear();
    localStorage.clear();
    window.location.replace('../html/admin/login.html');
    return;
  }
  // Save BA info to localStorage for later use
  localStorage.setItem('currentBA', JSON.stringify(user));

  // Fetch campaign assignment for this BA from Firestore
  let db = window.db, collection = window.collection, query = window.query, where = window.where, getDocs = window.getDocs;
  if (!db || !collection || !query || !where || !getDocs) {
    const mod = await import('../js/firebase.js');
    db = mod.db; collection = mod.collection; query = mod.query; where = mod.where; getDocs = mod.getDocs;
  }
  // Query campaign_ba_assignments for this BA
  const q = query(collection(db, 'campaign_ba_assignments'), where('baId', '==', user.id));
  const snap = await getDocs(q);
  let found = null;
  let todayStr_assign = new Date().toISOString().slice(0, 10);
  snap.forEach(doc => {
    const d = doc.data();
    // If assignment has a date, match today; else, fallback to first assignment
    if (d.assignmentDate) {
      if (d.assignmentDate === todayStr_assign) found = d;
    } else if (!found) {
      found = d;
    }
  });
  if (!found) {
    alert('No campaign assigned for you today.');
    window.location.replace('../html/admin/login.html');
    return;
  }
  // Set campaign info in sessionStorage for later use
  sessionStorage.setItem('currentCampaignId', found.campaignId || '');
  sessionStorage.setItem('currentCampaignName', found.campaignName || '');
  if (found.assignmentDate) sessionStorage.setItem('currentAssignmentDate', found.assignmentDate);
  // If you have campaign start/end in assignment, use them. Otherwise, fetch from campaigns collection.
  let campaignStart = '', campaignEnd = '', campaignLat = '', campaignLng = '';
  if (found.campaignId) {
    const campSnap = await getDocs(query(collection(db, 'campaigns'), where('id', '==', found.campaignId)));
    campSnap.forEach(c => {
      const cdata = c.data();
      campaignStart = cdata.start_date ? cdata.start_date + 'T' + (cdata.startTime || '00:00') : '';
      campaignEnd = cdata.end_date ? cdata.end_date + 'T' + (cdata.endTime || '23:59') : '';
      campaignLat = cdata.locationCoords?.lat || '';
      campaignLng = cdata.locationCoords?.lng || '';
    });
  }
  // If campaignStart/End missing, fallback to today
  if (!campaignStart) campaignStart = todayStr + 'T00:00';
  if (!campaignEnd) campaignEnd = todayStr + 'T23:59';
  sessionStorage.setItem('currentCampaignStart', campaignStart);
  sessionStorage.setItem('currentCampaignEnd', campaignEnd);
  sessionStorage.setItem('currentCampaignLat', campaignLat);
  sessionStorage.setItem('currentCampaignLng', campaignLng);
}

// What happens when user clicks "Cancel"
function handleCancel() {
  document.getElementById("modal-title").textContent = "Location Permission Required";
  document.getElementById("modal-text").textContent = "Access to your location is mandatory to verify you are at the correct zone.";
  document.getElementById("modal-status").textContent = "❌ Permission Denied";

  document.getElementById("modal-status").textContent = "Ready to verify...";

// Main processing logic
window.processLocation = async function processLocation() {
  // 0. Check campaign time before proceeding
  let campaignStart = sessionStorage.getItem('currentCampaignStart');
  let campaignEnd = sessionStorage.getItem('currentCampaignEnd');
  function isWithinCampaignHours(start, end) {
    if (!start || !end) return false;
    const now = new Date();
    // Only match the date (YYYY-MM-DD)
    const nowDate = now.toISOString().slice(0, 10);
    const startDate = new Date(start).toISOString().slice(0, 10);
    const endDate = new Date(end).toISOString().slice(0, 10);
    return nowDate >= startDate && nowDate <= endDate;
  }
  if (!isWithinCampaignHours(campaignStart, campaignEnd)) {
    alert('You cannot clock in yet. It is not the time for your campaign.');
    window.location.replace('../html/admin/login.html');
    return;
  }

  // Check clock-in/clock-out status for this campaign
  let user = null;
  try { user = JSON.parse(sessionStorage.getItem('user')); } catch (e) {}
  let campaignId = sessionStorage.getItem('currentCampaignId') || '';
  let db = window.db, collection = window.collection, query = window.query, where = window.where, getDocs = window.getDocs;
  if (!db || !collection || !query || !where || !getDocs) {
    // eslint-disable-next-line no-undef
    const mod = await import('../js/firebase.js');
    db = mod.db; collection = mod.collection; query = mod.query; where = mod.where; getDocs = mod.getDocs;
  }
  const q = query(collection(db, 'ba_clockins'), where('baId', '==', user.id), where('campaignId', '==', campaignId));
  const snap = await getDocs(q);
  let hasClockIn = false, hasClockOut = false;
  snap.forEach(doc => {
    const d = doc.data();
    if (d.type === 'clockin') hasClockIn = true;
    if (d.type === 'clockout') hasClockOut = true;
  });
  if (hasClockIn && hasClockOut) {
    alert('You have already completed this campaign. No further action is needed.');
    return;
  }
  if (hasClockIn && !hasClockOut) {
    if (confirm('You have already clocked in for this campaign. Please clock out to complete. Proceed to clock out?')) {
      showPage('permission-camera');
    }
    return;
  }

  // 1. Browser Pop-up Confirmation
  const userAgreed = confirm("Do you agree to share your current location for clock-in verification?");

  if (userAgreed) {
    const modalStatus = document.getElementById("modal-status");
    modalStatus.innerHTML = "📡 Accessing GPS...";
    modalStatus.style.color = "orange";

    if (!navigator.geolocation) {
      alert("Geolocation is not supported by your browser.");
      return;
    }

    // 2. Request Actual GPS coordinates
    navigator.geolocation.getCurrentPosition(
      function(position) {
        modalStatus.innerHTML = "✅ Location Verified!";
        modalStatus.style.color = "green";
        
        console.log("Lat:", position.coords.latitude, "Lon:", position.coords.longitude);

        // Success: Move to map page
        setTimeout(() => {
          document.getElementById("location-modal").style.display = "none";
          showPage("zone-map");
        }, 1200);
      },
      function(error) {
        // If they block it in browser settings
        modalStatus.innerHTML = "❌ GPS Error / Denied";
        modalStatus.style.color = "red";
        alert("Please enable location services in your device settings.");
      },
      { enableHighAccuracy: true, timeout: 5000 }
    );
  } else {
    // If they hit 'Cancel' on the confirm() pop-up
    handleCancel();
  }
}

// Modified showPage to trigger camera only when needed
function showPage(pageId) {
  const pages = document.querySelectorAll(".page");
  pages.forEach(page => page.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");

  // If we land on the camera page, start the webcam
  if (pageId === 'permission-camera') {
    startCamera();
  } else {
    stopCamera(); // Stop camera if we move to any other page
  }
}

async function startCamera() {
  const video = document.getElementById('webcam');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "user" }, 
      audio: false 
    });
    video.srcObject = stream;
  } catch (err) {
    console.error("Error accessing camera: ", err);
    alert("Could not access camera. Please ensure you have given permission.");
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }
}

function takeSnapshot() {
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('photo-canvas');
  const context = canvas.getContext('2d');

  // Set canvas size to match video stream
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // Draw the current video frame onto the canvas
  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Stop the camera and move to confirmation
  stopCamera();
  showPage('permission-confirm');
}

function retakePhoto() {
  showPage('permission-camera');
}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BA Clock In</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .page { display: none; }
    .active { display: block; }
    video, canvas { width: 100%; max-width: 400px; }
    .btn { padding: 10px 20px; margin: 10px; border: none; cursor: pointer; }
    .btn-green { background: green; color: white; }
    .btn-blue { background: blue; color: white; }
    .btn-red { background: red; color: white; }
  </style>
</head>

<body>

<h2>Welcome, <span id="baNameHeader"></span></h2>


<!-- LOCATION PAGE -->
<div id="location-page" class="page active">
  <h3>Location Verification</h3>
  <p id="location-status">Checking location permission...</p>
  <button class="btn btn-blue" id="location-btn" onclick="verifyLocation()">Verify Location</button>
</div>

<!-- CAMERA PAGE -->
<div id="permission-camera" class="page">
  <h3>Take Photo</h3>
  <video id="webcam" autoplay playsinline></video><br>
  <button class="btn btn-blue" onclick="takeSnapshot()">📷 Take Photo</button>
</div>

<!-- CONFIRM PAGE -->
<div id="permission-confirm" class="page">
  <h3>Confirm Photo</h3>
  <canvas id="photo-canvas"></canvas><br>
  <button class="btn btn-red" onclick="retakePhoto()">Retake</button>
  <button class="btn btn-green" onclick="saveClockInPhoto('clockin')">Confirm Clock In</button>
  <button class="btn btn-blue" onclick="saveClockInPhoto('clockout')">Clock Out</button>
</div>


<!-- HISTORY PAGE -->
<div id="history-page" class="page">
  <h3>My Clock-in/Out History</h3>
  <table border="1" style="margin:auto; width:90%">
    <thead>
      <tr><th>Type</th><th>Time</th><th>Photo</th><th>Location</th></tr>
    </thead>
    <tbody id="history-table"></tbody>
  </table>
  <button class="btn btn-blue" onclick="showPage('location-page')">Back</button>
</div>

<!-- SUCCESS PAGE -->
<div id="permission-success" class="page">
  <h3>✅ Saved Successfully</h3>
  <button class="btn btn-blue" onclick="showHistory()">View My History</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.query = query;
window.where = where;
window.getDocs = getDocs;
window.orderBy = orderBy;
</script>

<!-- MAIN SCRIPT -->
<script>
let stream = null;

// -------- USER --------
function getCurrentUser() {
  try {
    return JSON.parse(sessionStorage.getItem('user'));
  } catch {
    return null;
  }
}

// Show BA name and start at location page
document.addEventListener('DOMContentLoaded', () => {
  const user = getCurrentUser();
  if (!user) {
    alert("Please login first");
    window.location.href = '../html/admin/login.html';
    return;
  }
  document.getElementById('baNameHeader').textContent = user.name;
  showPage('location-page');
});
// -------- LOCATION --------
let currentLocation = null;
function verifyLocation() {
  const status = document.getElementById('location-status');
  status.textContent = 'Requesting location...';
  navigator.geolocation.getCurrentPosition(
    pos => {
      currentLocation = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };
      status.textContent = `Location OK: (${currentLocation.lat.toFixed(5)}, ${currentLocation.lng.toFixed(5)})`;
      document.getElementById('location-btn').disabled = true;
      // Proceed to campaign hours check
      checkCampaignHours();
    },
    err => {
      status.textContent = 'Location permission denied or unavailable.';
      alert('Location is required for clock-in/out.');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// -------- CAMPAIGN HOURS ENFORCEMENT --------
function checkCampaignHours() {
  // Example: Only allow clock-in/out between 7:00 and 19:00
  const now = new Date();
  const hour = now.getHours();
  if (hour < 7 || hour > 19) {
    alert('Clock-in/out only allowed between 7:00 and 19:00');
    showPage('location-page');
    document.getElementById('location-btn').disabled = false;
    return;
  }
  showPage('permission-camera');
  startCamera();
}

// -------- CAMERA --------
async function startCamera() {
  const video = document.getElementById('webcam');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;
  } catch (err) {
    alert("Camera permission denied");
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }
}

function takeSnapshot() {
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('photo-canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  stopCamera();
  showPage('permission-confirm');
}

function retakePhoto() {
  showPage('permission-camera');
  startCamera();
}

// -------- PAGE --------
function showPage(pageId) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

// -------- SAVE --------
async function saveClockInPhoto(type) {
  const user = getCurrentUser();
  if (!user || !user.id || !user.name) {
    alert("Session expired");
    return;
  }
  if (!currentLocation) {
    alert('Location required. Please verify location first.');
    showPage('location-page');
    return;
  }
  const canvas = document.getElementById('photo-canvas');
  const tmpCanvas = document.createElement('canvas');
  const ctx = tmpCanvas.getContext('2d');
  tmpCanvas.width = 320;
  tmpCanvas.height = 240;
  ctx.drawImage(canvas, 0, 0, 320, 240);
  const photo = tmpCanvas.toDataURL('image/jpeg', 0.7);
  const now = new Date().toLocaleString();
  let click_in = '';
  let click_out = '';
  if (type === 'clockin') click_in = now;
  if (type === 'clockout') click_out = now;
  try {
    await addDoc(collection(db, 'ba_clockins'), {
      baId: user.id,
      baName: user.name,
      role: user.role || "ba",
      campaignId: sessionStorage.getItem('currentCampaignId') || '',
      campaignName: sessionStorage.getItem('currentCampaignName') || '',
      photo: photo,
      type: type,
      click_in: click_in,
      click_out: click_out,
      lat: currentLocation.lat,
      lng: currentLocation.lng,
      timestamp: Date.now()
    });
    alert("Saved successfully!");
    showPage('permission-success');
  } catch (err) {
    console.error(err);
    alert("Error saving data");
  }
}

// -------- HISTORY --------
async function showHistory() {
  showPage('history-page');
  const user = getCurrentUser();
  const q = window.query(window.collection(window.db, 'ba_clockins'), window.where('baId', '==', user.id), window.orderBy('timestamp', 'desc'));
  const snap = await window.getDocs(q);
  const tbody = document.getElementById('history-table');
  tbody.innerHTML = '';
  snap.forEach(doc => {
    const d = doc.data();
    tbody.innerHTML += `<tr>
      <td>${d.type}</td>
      <td>${d.click_in || d.click_out || ''}</td>
      <td>${d.photo ? `<img src='${d.photo}' style='width:48px;height:48px;border-radius:6px;object-fit:cover;'/>` : ''}</td>
      <td>${d.lat && d.lng ? `${d.lat.toFixed(5)},${d.lng.toFixed(5)}` : ''}</td>
    </tr>`;
  });
}
</script>

</body>
</html>

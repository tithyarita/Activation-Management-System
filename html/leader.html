<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leader Dashboard | Control Center</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/admin-layout.css">

<style>

body { background:#f3f4f6; }

/* Layout */

.leader-wrapper{
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:240px;
background:#232946;
color:#fff;
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:28px 20px 18px;
font-size:1.3rem;
font-weight:bold;
display:flex;
align-items:center;
gap:12px;
}

.sidebar-nav{
flex:1;
display:flex;
flex-direction:column;
}

.sidebar-nav a{
color:#e0e6f7;
text-decoration:none;
padding:15px 28px;
display:flex;
align-items:center;
gap:12px;
font-size:1.08rem;
border-left:4px solid transparent;
transition:.18s;
}

.sidebar-nav a:hover,
.sidebar-nav a.active{
background:#353a5a;
border-left:4px solid #3b82f6;
color:#fff;
}

/* Main */

.main-content{
flex:1;
overflow-y:auto;
padding:32px 28px;
background:#f3f4f6;
}

/* Summary Cards */

.summary-section{
display:flex;
flex-wrap:wrap;
gap:24px;
margin-top:18px;
}

.summary-card{
flex:1 1 220px;
background:#fff;
padding:24px 22px;
border-radius:14px;
display:flex;
align-items:center;
gap:18px;
box-shadow:0 2px 10px rgba(35,41,70,0.07);
min-width:200px;
}

.card-icon{
font-size:2.2rem;
color:#fff;
width:54px;
height:54px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#6366f1,#3b82f6);
}

.card-content h3{
margin:0 0 4px;
font-size:1.13rem;
font-weight:700;
}

.card-content p{
margin:0;
font-size:2rem;
font-weight:bold;
}

/* Campaign Row Layout */

.campaigns-card-list{
display:flex;
flex-direction:column;
gap:12px;
margin-top:18px;
}

.campaign-card{
background:#fff;
border-radius:8px;
box-shadow:0 1px 4px rgba(35,41,70,0.06);
padding:12px 18px;
display:flex;
align-items:center;
gap:24px;
}

.campaign-header{
flex:2;
display:flex;
align-items:center;
gap:16px;
}

.campaign-header h4{
margin:0;
font-size:1.08rem;
font-weight:600;
}

.campaign-status{
background:#e0e7ff;
color:#3730a3;
padding:2px 10px;
border-radius:8px;
font-size:.95rem;
font-weight:600;
}

.campaign-info{
flex:3;
display:flex;
gap:24px;
font-size:.97rem;
}

.campaign-actions{
flex:1;
display:flex;
gap:8px;
justify-content:flex-end;
}

/* Buttons */

.btn{
padding:5px 12px;
border:none;
border-radius:5px;
font-size:.98rem;
cursor:pointer;
font-weight:500;
}

.btn-edit{background:#fbbf24;color:#fff;}
.btn-danger{background:#ef4444;color:#fff;}
.btn-assign{background:#6366f1;color:#fff;}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:14px;
overflow:hidden;
margin-top:18px;
box-shadow:0 2px 10px rgba(35,41,70,0.06);
}

th,td{
padding:13px 16px;
text-align:left;
border-bottom:1px solid #e5e7eb;
font-size:1.04rem;
}

th{
background:#f6f7fb;
font-weight:600;
}

.loading-text{
color:#6b7280;
font-style:italic;
}

/* Modal */

.modal-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.3);
align-items:center;
justify-content:center;
z-index:1000;
}

.modal-content-box {
  background: #fff;
  padding: 28px 32px; /* slightly smaller padding for modern compact look */
  border-radius: 16px; /* softer corners */
  min-width: 360px;   /* slightly wider for readability */
  max-width: 90vw;    /* responsive */
  max-height: 85vh;   /* a bit smaller for better fit on screen */
  overflow-y: auto;
  position: relative;
  box-shadow: 0 12px 32px rgba(35, 41, 70, 0.12), 0 4px 8px rgba(35, 41, 70, 0.08); /* layered subtle shadows */
  border: 1px solid #e5e7eb; /* soft border for a clean card look */
  transition: transform 0.2s ease, box-shadow 0.2s ease; /* smooth hover/animation */
}
p{
  margin:0;
  font-size:1.04rem;
  font-weight:500;
  color:#232946;
  margin-top:12px;
  margin-bottom:12px;

}
.modal-content-box:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(35, 41, 70, 0.15), 0 6px 12px rgba(35, 41, 70, 0.1);
}
.modal-close-btn{
position:absolute;
top:14px;
right:18px;
font-size:1.6rem;
background:none;
border:none;
cursor:pointer;
}

</style>

</head>

<body>
<script>
  // Redirect to login if not logged in as leader
  (function() {
    let user = null;
    try {
      user = JSON.parse(sessionStorage.getItem('user'));
    } catch (e) {}
    if (!user || user.role !== 'leader') {
      window.location.href = '/html/admin/login.html';
    }
  })();
</script>

<div class="leader-wrapper">

<!-- Sidebar -->

<aside class="sidebar">

<div class="sidebar-header">
<i class="fa-solid fa-star"></i>
AMS Leader
</div>

<nav class="sidebar-nav">

<a class="nav-item active">
<i class="fa-solid fa-home"></i>
Dashboard
</a>

<a class="nav-item">
<i class="fa-solid fa-calendar"></i>
Campaigns
</a>

<a class="nav-item">
<i class="fa-solid fa-users"></i>
Brand Ambassadors
</a>

<a onclick="handleLogout()">
<i class="fa-solid fa-sign-out-alt"></i>
Logout
</a>

</nav>

</aside>

<!-- Main -->

<main class="main-content">

<div id="dashboard">

<section class="summary-section">

<div class="summary-card">
<div class="card-icon">
<i class="fa-solid fa-calendar"></i>
</div>
<div class="card-content">
<h3>My Campaigns</h3>
<p id="leaderTotalCampaigns">0</p>
</div>
</div>

<div class="summary-card">
<div class="card-icon"
style="background:linear-gradient(135deg,#ec4899,#f59e42)">
<i class="fa-solid fa-users"></i>
</div>
<div class="card-content">
<h3>Brand Ambassadors</h3>
<p id="leaderTotalBAs">0</p>
</div>
</div>

</section>

<section>

<h2>Recent Campaigns</h2>

<div id="campaignsCardContainer" class="campaigns-card-list">
<p class="loading-text">Loading campaigns...</p>
</div>

</section>

<section>

<h2>Brand Ambassadors</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Role</th>
<th>Campaigns</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="baTableBody">

<tr>
<td colspan="5" class="loading-text">
Loading brand ambassadors...
</td>
</tr>

</tbody>

</table>

</section>

</div>

</main>

</div>

<!-- Modal -->

<div id="detailModal" class="modal-overlay">

<div class="modal-content-box">

<button class="modal-close-btn"
onclick="document.getElementById('detailModal').style.display='none'">
&times;
</button>

<div id="detailModalContent"></div>

</div>

</div>

<script type="module" src="../js/leader-dashboard.js"></script>

</body>
</html>
